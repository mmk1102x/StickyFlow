<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StickyFlow - Focus in Motion</title>
    <!-- Tailwind CSS 4 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style type="text/tailwindcss">
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=PT+Serif:ital,wght@0,400;0,700;1,400&display=swap');
        
        @theme {
            --font-sans: "Inter", ui-sans-serif, system-ui, sans-serif;
            --font-serif: "PT Serif", ui-serif, Georgia, serif;
            --color-vibrant-bg-start: #2a2a4a;
            --color-vibrant-bg-mid: #4a417a;
            --color-vibrant-bg-end: #7c5c96;
        }

        body {
            background: linear-gradient(135deg, #2a2a4a 0%, #4a417a 50%, #7c5c96 100%);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            overscroll-behavior-y: contain;
        }

        /* Hide scrollbars but allow scrolling */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import React, { useState, useEffect, useRef } from 'https://esm.sh/react@19?dev';
        import { createRoot } from 'https://esm.sh/react-dom@19/client?dev';
        import { motion, AnimatePresence, Reorder } from 'https://esm.sh/framer-motion@11.11.17?deps=react@19';
        import * as Lucide from 'https://esm.sh/lucide-react@0.454.0?deps=react@19';
        import confetti from 'https://esm.sh/canvas-confetti@1.9.2';

        const { Plus, Archive, X, Trash2, CheckCircle2, ListRestart } = Lucide;

        const COLORS = {
            yellow: { bg: '#fff78e', border: '#fde047', accent: '#ca8a04' },
            pink: { bg: '#ffafcc', border: '#f9a8d4', accent: '#db2777' },
            green: { bg: '#b9fbc0', border: '#86efac', accent: '#16a34a' },
            blue: { bg: '#a2d2ff', border: '#93c5fd', accent: '#2563eb' },
            purple: { bg: '#d6bcfd', border: '#c4b5fd', accent: '#7c3aed' },
        };

        function App() {
            const [tasks, setTasks] = useState([]);
            const [archivedTasks, setArchivedTasks] = useState([]);
            const [isAdding, setIsAdding] = useState(false);
            const [newTaskText, setNewTaskText] = useState('');
            const [selectedColor, setSelectedColor] = useState('yellow');
            const [showArchive, setShowArchive] = useState(false);
            
            const archiveButtonRef = useRef(null);

            useEffect(() => {
                const savedTasks = localStorage.getItem('stickyflow_tasks');
                const savedArchive = localStorage.getItem('stickyflow_archive');
                if (savedTasks) setTasks(JSON.parse(savedTasks));
                if (savedArchive) setArchivedTasks(JSON.parse(savedArchive));
            }, []);

            useEffect(() => {
                if (isAdding) {
                    const colors = Object.keys(COLORS);
                    setSelectedColor(colors[Math.floor(Math.random() * colors.length)]);
                }
            }, [isAdding]);

            useEffect(() => {
                localStorage.setItem('stickyflow_tasks', JSON.stringify(tasks));
                localStorage.setItem('stickyflow_archive', JSON.stringify(archivedTasks));
            }, [tasks, archivedTasks]);

            const addTask = () => {
                if (!newTaskText.trim()) return;
                const newTask = {
                    id: crypto.randomUUID(),
                    text: newTaskText,
                    color: selectedColor,
                    isArchived: false,
                    order: 0,
                };
                setTasks([newTask, ...tasks]);
                setNewTaskText('');
                setIsAdding(false);
            };

            const archiveTask = (taskId) => {
                const taskToArchive = tasks.find(t => t.id === taskId);
                if (!taskToArchive || !archiveButtonRef.current) return;

                const buttonRect = archiveButtonRef.current.getBoundingClientRect();
                const colorHex = COLORS[taskToArchive.color].accent;
                
                confetti({
                    particleCount: 40,
                    spread: 70,
                    origin: { 
                        x: (buttonRect.left + buttonRect.width / 2) / window.innerWidth, 
                        y: (buttonRect.top + buttonRect.height / 2) / window.innerHeight 
                    },
                    colors: [colorHex, '#ffffff'],
                    ticks: 200,
                    gravity: 1.2,
                    decay: 0.94,
                    startVelocity: 30,
                    shapes: ['circle']
                });

                setTasks(tasks.filter(t => t.id !== taskId));
                setArchivedTasks([{ ...taskToArchive, isArchived: true }, ...archivedTasks]);
            };

            const deleteTaskPermanently = (taskId) => {
                setArchivedTasks(archivedTasks.filter(t => t.id !== taskId));
            };

            const restoreTask = (taskId) => {
                const task = archivedTasks.find(t => t.id === taskId);
                if (!task) return;
                setArchivedTasks(archivedTasks.filter(t => t.id !== taskId));
                setTasks([{ ...task, isArchived: false }, ...tasks]);
            };

            return React.createElement('div', { 
                className: "min-h-screen w-full font-sans text-slate-100 flex flex-col items-center p-4 md:p-8"
            }, [
                // Header
                React.createElement('header', { key: 'header', className: "w-full max-w-2xl flex justify-between items-center mb-8" }, [
                    React.createElement('div', { key: 'logo-box' }, [
                        React.createElement('h1', { className: "text-3xl font-extrabold tracking-tighter text-white lowercase" }, 'stickyflow.'),
                        React.createElement('p', { className: "text-white/40 text-[10px] uppercase tracking-widest mt-1" }, 'Design in sync')
                    ]),
                    React.createElement('button', {
                        key: 'archive-toggle',
                        onClick: () => setShowArchive(!showArchive),
                        className: `p-3 rounded-full transition-all duration-500 flex items-center gap-2 group ${showArchive ? 'bg-white text-indigo-900 shadow-xl' : 'bg-white/10 text-white/70 hover:bg-white/20'}`
                    }, React.createElement(Archive, { size: 20, className: "group-hover:scale-110 transition-transform" }))
                ]),

                // Content
                React.createElement('div', { key: 'content', className: "w-full max-w-lg flex-1 relative flex flex-col gap-6" }, [
                    React.createElement('div', { className: "w-full flex-1 min-h-[400px]" }, 
                        tasks.length === 0 
                        ? React.createElement('div', { className: "h-full flex flex-col items-center justify-center text-slate-500 border-2 border-dashed border-white/10 rounded-3xl p-12 text-center" }, [
                            React.createElement('div', { className: "mb-4 opacity-10" }, React.createElement(Plus, { size: 64 })),
                            React.createElement('p', { className: "text-lg font-medium text-white/40" }, 'No tasks yet'),
                            React.createElement('p', { className: "text-sm text-white/20" }, 'Add a sticky note to start')
                          ])
                        : React.createElement(Reorder.Group, { axis: "y", values: tasks, onReorder: setTasks, className: "flex flex-col gap-4 items-center" }, 
                            React.createElement(AnimatePresence, { mode: "popLayout" }, 
                                tasks.map((task, index) => React.createElement(Reorder.Item, {
                                    key: task.id,
                                    value: task,
                                    id: `note-${task.id}`,
                                    initial: { opacity: 0, scale: 0.8, y: 20 },
                                    animate: { 
                                        opacity: 1, 
                                        scale: index === 0 ? 1.05 : index === 1 ? 1 : 0.95,
                                        y: 0,
                                        zIndex: 100 - index
                                    },
                                    exit: { 
                                        opacity: 0, 
                                        scale: 0.5,
                                        translateX: 0,
                                        translateY: 500,
                                        transition: { duration: 0.3 }
                                    },
                                    whileDrag: { scale: 1.1, rotate: 2, zIndex: 1000 },
                                    className: "w-full relative px-2"
                                }, React.createElement(StickyNote, { task, isTop: index === 0, onArchive: () => archiveTask(task.id) })))
                            )
                          )
                    )
                ]),

                // Actions
                React.createElement('div', { key: 'actions', className: "fixed bottom-0 left-0 w-full p-6 pb-10 flex justify-between items-end pointer-events-none z-50" }, [
                    React.createElement('div', { className: "flex flex-col items-center gap-2 pointer-events-auto" }, [
                        React.createElement('div', { className: "text-[9px] text-white/30 uppercase tracking-[0.2em] font-bold" }, 'Archive'),
                        React.createElement('button', {
                            ref: archiveButtonRef,
                            onClick: () => setShowArchive(!showArchive),
                            className: `relative w-16 h-16 md:w-20 md:h-20 rounded-full border-2 border-dashed transition-all duration-500 group flex items-center justify-center backdrop-blur-md ${showArchive ? 'bg-white/20 border-white scale-110' : 'bg-white/5 border-white/30 hover:border-white/60 hover:scale-105'}`
                        }, [
                            React.createElement('div', { className: `w-6 h-6 md:w-8 md:h-8 border-2 rounded-sm relative transition-colors ${showArchive ? 'border-white' : 'border-white/60 group-hover:border-white'}` }, 
                                React.createElement('div', { className: "absolute top-1.5 left-1 w-3 md:w-4 h-[2px] bg-current" })
                            ),
                            React.createElement('div', { className: "absolute top-[-5px] left-[10px] w-0.5 h-0.5 bg-white rounded-full shadow-[0_0_4px_white]" }),
                            React.createElement('div', { className: "absolute top-[15px] right-[-8px] w-0.5 h-0.5 bg-white rounded-full shadow-[0_0_4px_white]" })
                        ])
                    ]),
                    React.createElement('div', { className: "pointer-events-auto" }, 
                        React.createElement(motion.button, {
                            whileHover: { scale: 1.05 },
                            whileTap: { scale: 0.95 },
                            onClick: () => setIsAdding(true),
                            className: "bg-gradient-to-r from-indigo-500 to-purple-600 p-4 rounded-xl md:rounded-2xl shadow-xl flex items-center gap-2 text-white font-bold px-6 md:px-8 border border-white/10"
                        }, [
                            React.createElement(Plus, { size: 24 }),
                            React.createElement('span', { className: "hidden sm:inline" }, 'New Task'),
                            React.createElement('span', { className: "sm:hidden text-sm uppercase tracking-widest" }, 'New')
                        ])
                    )
                ]),

                // Modals
                React.createElement(AnimatePresence, { key: 'modals' }, [
                    isAdding && React.createElement('div', { key: 'add-modal', className: "fixed inset-0 z-[100] flex items-center justify-center p-4" }, [
                        React.createElement(motion.div, { initial: { opacity: 0 }, animate: { opacity: 1 }, exit: { opacity: 0 }, onClick: () => setIsAdding(false), className: "absolute inset-0 bg-slate-950/80 backdrop-blur-sm" }),
                        React.createElement(motion.div, { initial: { scale: 0.9, opacity: 0, y: 50 }, animate: { scale: 1, opacity: 1, y: 0 }, exit: { scale: 0.9, opacity: 0, y: 50 }, className: "relative w-full max-w-sm bg-slate-900 border border-slate-800 rounded-3xl p-8 shadow-2xl" }, [
                            React.createElement('h2', { className: "text-xl font-bold mb-6 flex items-center gap-2" }, [React.createElement(Plus, { className: "text-indigo-400" }), ' Create New Sticky']),
                            React.createElement('textarea', {
                                autoFocus: true,
                                placeholder: "What's bothering your mind?",
                                className: "w-full bg-slate-800 text-slate-100 rounded-2xl p-4 min-h-[120px] focus:ring-2 focus:ring-indigo-500 outline-none mb-6",
                                value: newTaskText,
                                onChange: (e) => setNewTaskText(e.target.value)
                            }),
                            React.createElement('div', { className: "flex justify-between items-center mb-8" }, 
                                React.createElement('div', { className: "flex gap-2" }, 
                                    Object.keys(COLORS).map(c => React.createElement('button', {
                                        key: c,
                                        onClick: () => setSelectedColor(c),
                                        className: `w-8 h-8 rounded-full border-2 transition-transform ${selectedColor === c ? 'scale-125 border-white shadow-lg' : 'border-transparent'}`,
                                        style: { backgroundColor: COLORS[c].bg }
                                    }))
                                )
                            ),
                            React.createElement('div', { className: "flex gap-3" }, [
                                React.createElement('button', { onClick: () => setIsAdding(false), className: "flex-1 py-3 bg-slate-800 text-slate-300 font-bold rounded-2xl" }, 'Cancel'),
                                React.createElement('button', { onClick: addTask, className: "flex-1 py-3 bg-indigo-500 text-white font-bold rounded-2xl" }, 'Add Note')
                            ])
                        ])
                    ]),

                    showArchive && React.createElement('div', { key: 'archive-modal', className: "fixed inset-0 z-[110] flex items-end md:items-center justify-center p-0 md:p-4" }, [
                        React.createElement(motion.div, { initial: { opacity: 0 }, animate: { opacity: 1 }, exit: { opacity: 0 }, onClick: () => setShowArchive(false), className: "absolute inset-0 bg-slate-950/80 backdrop-blur-sm" }),
                        React.createElement(motion.div, { initial: { y: "100%" }, animate: { y: 0 }, exit: { y: "100%" }, className: "relative w-full max-w-2xl h-[80vh] md:h-auto md:max-h-[85vh] bg-slate-900 border-t md:border border-slate-800 rounded-t-3xl md:rounded-3xl flex flex-col shadow-2xl overflow-hidden" }, [
                            React.createElement('div', { className: "p-6 border-b border-slate-800 flex justify-between items-center bg-slate-900 z-10" }, [
                                React.createElement('div', { className: "flex items-center gap-3", key: 'arc-h' }, [
                                    React.createElement(Archive, { className: "text-indigo-400" }),
                                    React.createElement('h2', { className: "text-2xl font-bold" }, 'Past Achievements'),
                                    React.createElement('span', { className: "bg-slate-800 text-slate-400 text-xs py-1 px-2.5 rounded-full font-mono" }, archivedTasks.length)
                                ]),
                                React.createElement('button', { key: 'arc-x', onClick: () => setShowArchive(false), className: "p-2 hover:bg-slate-800 rounded-full text-slate-400" }, React.createElement(X, { size: 24 }))
                            ]),
                            React.createElement('div', { className: "flex-1 overflow-y-auto p-6 scrollbar-hide" }, 
                                archivedTasks.length === 0 
                                ? React.createElement('p', { className: "text-center text-slate-600 py-12" }, 'Archive is empty')
                                : React.createElement('div', { className: "grid grid-cols-1 gap-3" }, archivedTasks.map(task => 
                                    React.createElement(motion.div, { layout: true, key: task.id, className: "bg-white/5 border border-white/10 p-4 rounded-lg flex items-center justify-between backdrop-blur-xs" }, [
                                        React.createElement('div', { className: "flex items-center gap-4", key: 'task-info' }, [
                                            React.createElement('div', { className: "w-1.5 h-6 rounded-full", style: { backgroundColor: COLORS[task.color].bg } }),
                                            React.createElement('p', { className: "line-through text-white/40 font-medium italic font-serif" }, task.text)
                                        ]),
                                        React.createElement('div', { className: "flex gap-2", key: 'task-actions' }, [
                                            React.createElement('button', { onClick: () => restoreTask(task.id), className: "p-2 text-white/30 hover:text-white" }, React.createElement(ListRestart, { size: 18 })),
                                            React.createElement('button', { onClick: () => deleteTaskPermanently(task.id), className: "p-2 text-white/30 hover:text-rose-400" }, React.createElement(Trash2, { size: 18 }))
                                        ])
                                    ])
                                  ))
                            )
                        ])
                    ])
                ])
            ]);
        }

        function StickyNote({ task, isTop, onArchive }) {
            const color = COLORS[task.color];
            const rotation = isTop ? 'rotate-[-2deg]' : (task.text.length % 2 === 0 ? 'rotate-1' : 'rotate-[-1.5deg]');
            
            return React.createElement('div', {
                className: `group relative w-full p-8 rounded-sm transition-all duration-300 transform-gpu touch-none ${rotation} ${isTop ? 'max-w-md py-10' : 'max-w-sm'}`,
                style: { 
                    backgroundColor: color.bg,
                    boxShadow: '10px 10px 20px rgba(0,0,0,0.3), inset 0 -2px 10px rgba(0,0,0,0.05)'
                }
            }, [
                React.createElement('div', { key: 'pin', className: "absolute top-2 left-1/2 -translate-x-1/2 w-3 h-3 bg-rose-500 rounded-full shadow-md z-10" }),
                React.createElement('div', { key: 'content', className: "flex flex-col gap-4 h-full" }, [
                    isTop && React.createElement('div', { key: 'label', className: "text-[10px] font-bold text-slate-900/40 uppercase tracking-widest mb-1" }, 'NOW FOCUS'),
                    React.createElement('p', { key: 'text', className: `text-slate-900 leading-tight font-serif whitespace-pre-wrap break-words ${isTop ? 'text-2xl font-bold italic' : 'text-[1.1rem] font-semibold'}` }, task.text),
                    React.createElement('div', { key: 'footer', className: "flex justify-between items-center mt-auto pt-4 opacity-0 group-hover:opacity-100 transition-opacity" }, [
                        React.createElement('div', { className: "text-[9px] font-bold text-slate-900/30 uppercase tracking-widest" }, isTop ? 'High Priority' : 'Next Step'),
                        React.createElement(motion.button, {
                            whileHover: { scale: 1.1 },
                            whileTap: { scale: 0.9 },
                            onClick: onArchive,
                            className: "flex items-center gap-2 bg-slate-950/10 hover:bg-slate-950/20 text-slate-900 py-1.5 px-3 rounded-lg font-bold text-[10px] border border-slate-950/10"
                        }, [
                            React.createElement(CheckCircle2, { size: 14 }),
                            'Complete'
                        ])
                    ])
                ]),
                React.createElement('div', { key: 'curl', className: "absolute bottom-0 right-0 w-8 h-8 pointer-events-none overflow-hidden" }, 
                    React.createElement('div', { className: "absolute bottom-[-15px] right-[-15px] w-12 h-12 bg-black/10 rotate-45" })
                )
            ]);
        }

        const root = createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
